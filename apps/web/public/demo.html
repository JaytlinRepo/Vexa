<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sovexa — Your AI Content Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif}

/* ── Scene system ── */
.scene{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;z-index:1}
.scene.active{opacity:1;pointer-events:auto;z-index:2}

/* ── Scene transitions ── */
.scene.enter-up{animation:sceneUp 1s cubic-bezier(.16,1,.3,1) forwards}
.scene.enter-wipe{animation:sceneWipe 1s cubic-bezier(.22,1,.36,1) forwards}
.scene.enter-zoom{animation:sceneZoom 1.1s cubic-bezier(.16,1,.3,1) forwards}
.scene.enter-slide{animation:sceneSlide 1s cubic-bezier(.16,1,.3,1) forwards}
.scene.exit-down{animation:sceneExitDown .6s cubic-bezier(.83,0,.17,1) forwards}
.scene.exit-fade{animation:sceneExitFade .5s ease-out forwards}
.scene.exit-zoom{animation:sceneExitZoom .6s cubic-bezier(.83,0,.17,1) forwards}

@keyframes sceneUp{0%{opacity:0;transform:translateY(60px) scale(.98);filter:blur(10px)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
@keyframes sceneWipe{0%{opacity:0;clip-path:inset(0 0 100% 0);filter:blur(4px)}60%{filter:blur(0)}100%{opacity:1;clip-path:inset(0 0 0 0);filter:blur(0)}}
@keyframes sceneZoom{0%{opacity:0;transform:scale(1.08);filter:blur(14px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
@keyframes sceneSlide{0%{opacity:0;transform:translateX(80px) scale(.98);filter:blur(10px)}100%{opacity:1;transform:translateX(0) scale(1);filter:blur(0)}}
@keyframes sceneExitDown{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-30px) scale(.98);filter:blur(8px)}}
@keyframes sceneExitFade{0%{opacity:1}100%{opacity:0;filter:blur(10px)}}
@keyframes sceneExitZoom{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.95);filter:blur(10px)}}

/* ── Dark dissolve transition overlay ── */
#wipe{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;background:#0a0a0a}
@keyframes wipeIn{0%{opacity:0}40%{opacity:1}60%{opacity:1}100%{opacity:0}}

/* ── Typography ── */
.kt{font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-style:italic;line-height:1.08;letter-spacing:-.03em;text-align:center}
.kt-hero{font-size:clamp(48px,8vw,96px)}
.kt-big{font-size:clamp(36px,6vw,72px)}
.kt-med{font-size:clamp(24px,3.5vw,42px)}
.kt-body{font-family:'DM Sans',sans-serif;font-weight:400;font-size:clamp(15px,1.8vw,20px);line-height:1.7;opacity:.55;max-width:520px;text-align:center;font-style:normal}
.kt em,.kt strong{font-style:italic;font-weight:300;color:var(--accent,#d4a574)}

/* ── Word animation ── */
.w{display:inline-block;opacity:0;transform:translateY(22px);filter:blur(8px);animation:wIn .55s cubic-bezier(.16,1,.3,1) forwards}
@keyframes wIn{to{opacity:1;transform:translateY(0);filter:blur(0)}}

/* ── Typed characters ── */
.ch{display:inline-block;opacity:0;animation:chIn .08s steps(1) forwards}
@keyframes chIn{to{opacity:1}}

/* ── 3D tilted UI cards ── */
.tilt-card{position:absolute;background:#171717;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 22px;box-shadow:0 30px 80px rgba(0,0,0,.5);opacity:0;transform-style:preserve-3d}
.tilt-card.in{animation:tiltIn .9s cubic-bezier(.16,1,.3,1) forwards}
@keyframes tiltIn{0%{opacity:0;transform:perspective(800px) rotateY(var(--ry,8deg)) rotateX(var(--rx,4deg)) translateZ(-60px) scale(.85);filter:blur(8px)}100%{opacity:1;transform:perspective(800px) rotateY(var(--ry,8deg)) rotateX(var(--rx,4deg)) translateZ(0) scale(1);filter:blur(var(--fb,2px))}}

/* ── Agent card ── */
.acard{opacity:0;transform:translateY(40px) scale(.9);animation:acardIn .7s cubic-bezier(.16,1,.3,1) forwards}
@keyframes acardIn{to{opacity:1;transform:translateY(0) scale(1)}}

/* ── Radial pulse rings ── */
.pulse-ring{position:absolute;border-radius:50%;border:2px solid var(--accent,#d4a574);opacity:0;animation:ringPulse 2s ease-out infinite}
@keyframes ringPulse{0%{transform:scale(.5);opacity:.6}100%{transform:scale(2.5);opacity:0}}

/* ── Mockup ── */
.mock3d{opacity:0;transform:perspective(1200px) rotateX(8deg) rotateY(-4deg) translateY(40px) scale(.92);filter:blur(12px);animation:mock3dIn 1.2s cubic-bezier(.16,1,.3,1) forwards}
@keyframes mock3dIn{to{opacity:1;transform:perspective(1200px) rotateX(2deg) rotateY(-1deg) translateY(0) scale(1);filter:blur(0)}}

/* ── Progress ── */
#demo-progress{position:fixed;top:0;left:0;height:2px;background:var(--accent,#d4a574);z-index:20;transition:width .4s}
#demo-skip{position:fixed;top:20px;right:24px;z-index:20;background:none;border:none;color:rgba(255,255,255,.3);font:11px/1 'DM Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}

/* ── CTA ── */
.cta-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:8px;background:var(--accent,#d4a574);color:#0a0a0a;font:600 14px/1 'DM Sans',sans-serif;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;box-shadow:0 0 50px rgba(212,165,116,.3);transition:all .3s}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 0 80px rgba(212,165,116,.5)}
</style>
</head>
<body>

<div id="demo-progress" style="width:0"></div>
<button id="demo-skip">Skip</button>

<!-- Color wipe overlay -->
<div id="wipe"></div>

<!-- ═══ S0: Hook ═══ -->
<div class="scene" id="s0" style="background:#0a0a0a;color:#edede9">
  <div class="kt kt-big" id="s0t"></div>
</div>

<!-- ═══ S1: Pain — scattered cards + text ═══ -->
<div class="scene" id="s1" style="background:#0a0a0a;color:#edede9">
  <div id="s1cards" style="position:absolute;inset:0;overflow:hidden"></div>
  <div class="kt kt-big" id="s1t" style="position:relative;z-index:2"></div>
</div>

<!-- ═══ S2: Pain stack ═══ -->
<div class="scene" id="s2" style="background:#0a0a0a;color:#edede9">
  <div class="kt kt-big" id="s2t"></div>
  <div class="kt-body" id="s2b" style="margin-top:20px;opacity:0"></div>
</div>

<!-- ═══ S3: Color wipe — "What if" ═══ -->
<div class="scene" id="s3" style="background:linear-gradient(135deg,#111 0%,#1a1510 100%);color:#edede9">
  <div class="kt kt-hero" id="s3t"></div>
</div>

<!-- ═══ S4: Meet the team ═══ -->
<div class="scene" id="s4" style="background:#0a0a0a;color:#edede9">
  <div class="kt kt-med" id="s4title" style="margin-bottom:40px"></div>
  <div id="s4agents" style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:920px"></div>
  <!-- Pulse rings behind agents -->
  <div id="s4rings" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>
</div>

<!-- ═══ S5: Pipeline flow ═══ -->
<div class="scene" id="s5" style="background:#0a0a0a;color:#edede9">
  <div class="kt kt-big" id="s5t"></div>
  <div id="s5flow" style="display:flex;align-items:center;gap:16px;margin-top:44px;flex-wrap:wrap;justify-content:center"></div>
</div>

<!-- ═══ S5b: Live workflow demo ═══ -->
<div class="scene" id="s5b" style="background:#0a0a0a;color:#edede9">
  <div class="kt kt-med" id="s5btitle" style="margin-bottom:32px"></div>
  <div id="s5bdemo" style="width:min(90vw,800px)"></div>
</div>

<!-- ═══ S5c: Calendar view ═══ -->
<div class="scene" id="s5c" style="background:#0a0a0a;color:#edede9">
  <div class="kt kt-med" id="s5ctitle" style="margin-bottom:28px"></div>
  <div id="s5ccal" style="width:min(90vw,900px)"></div>
</div>

<!-- ═══ S5d: Knowledge feed ═══ -->
<div class="scene" id="s5d" style="background:#0a0a0a;color:#edede9">
  <div class="kt kt-med" id="s5dtitle" style="margin-bottom:28px"></div>
  <div id="s5dfeed" style="width:min(90vw,700px)"></div>
</div>

<!-- ═══ S6: Product reveal — 3D mockup ═══ -->
<div class="scene" id="s6" style="background:radial-gradient(ellipse at 40% 30%,#1a1510 0%,#0a0a0a 70%);color:#edede9">
  <div class="kt kt-med" id="s6title" style="margin-bottom:28px;position:relative;z-index:2"></div>
  <div id="s6mock" style="position:relative;z-index:1;width:min(92vw,1100px)"></div>
</div>

<!-- ═══ S7: CTA — matches the real home hero exactly for seamless dissolve ═══ -->
<div class="scene" id="s7" style="background:#0a0a0a;color:#edede9">
  <div class="kt kt-hero" id="s7t"></div>
  <div class="kt-body" id="s7b" style="margin:24px 0 40px;opacity:0"></div>
  <div id="s7buttons" style="display:flex;gap:12px;opacity:0">
    <a href="/" class="cta-btn" style="padding:14px 28px;font-size:13px">Get started free</a>
    <a href="/" class="cta-btn" style="padding:14px 28px;font-size:13px;background:transparent;border:1px solid rgba(255,255,255,.14);color:#edede9;box-shadow:none">See how it works</a>
  </div>
  <div id="s7meta" style="display:flex;gap:16px;margin-top:20px;opacity:0;font-size:11px;color:rgba(255,255,255,.25)">
    <span>No credit card required</span>
    <span style="width:1px;background:rgba(255,255,255,.1)"></span>
    <span>First output under 5 minutes</span>
    <span style="width:1px;background:rgba(255,255,255,.1)"></span>
    <span>Cancel anytime</span>
  </div>
</div>

<script>
const A = '#d4a574'
document.documentElement.style.setProperty('--accent', A)

const SCENES = [
  { id:'s0', dur:3200, enter:'enter-zoom', exit:'exit-fade', wipe:false, setup:setupS0 },
  { id:'s1', dur:4500, enter:'enter-up',   exit:'exit-down', wipe:false, setup:setupS1 },
  { id:'s2', dur:4500, enter:'enter-wipe',  exit:'exit-zoom', wipe:false, setup:setupS2 },
  { id:'s3', dur:3000, enter:'enter-zoom',  exit:'exit-fade', wipe:true,  setup:setupS3 },
  { id:'s4', dur:6000, enter:'enter-slide', exit:'exit-down', wipe:false, setup:setupS4 },
  { id:'s5',  dur:5500, enter:'enter-wipe',  exit:'exit-zoom', wipe:false, setup:setupS5 },
  { id:'s5b', dur:7000, enter:'enter-up',    exit:'exit-fade', wipe:true,  setup:setupS5b },
  { id:'s5c', dur:6000, enter:'enter-slide', exit:'exit-down', wipe:false, setup:setupS5c },
  { id:'s5d', dur:5500, enter:'enter-wipe',  exit:'exit-zoom', wipe:false, setup:setupS5d },
  { id:'s6',  dur:6500, enter:'enter-zoom',  exit:'exit-fade', wipe:true,  setup:setupS6 },
  { id:'s7',  dur:9000, enter:'enter-zoom',  exit:null,        wipe:true,  setup:setupS7 },
]

let cur = -1, timer = null

function go(idx) {
  if (idx >= SCENES.length) return
  if (idx === cur) return
  clearTimeout(timer)

  const prev = cur >= 0 ? SCENES[cur] : null
  const next = SCENES[idx]

  // Exit previous
  if (prev) {
    const prevEl = document.getElementById(prev.id)
    prevEl.classList.remove('active', prev.enter)
    if (prev.exit) {
      prevEl.classList.add(prev.exit)
      setTimeout(() => prevEl.classList.remove(prev.exit), 600)
    } else {
      prevEl.style.opacity = '0'
    }
  }

  // Dark dissolve transition
  if (next.wipe) {
    const w = document.getElementById('wipe')
    w.style.animation = 'none'
    w.offsetHeight
    w.style.animation = 'wipeIn 1s ease-in-out forwards'
  }

  const delay = next.wipe ? 500 : 100
  setTimeout(() => {
    cur = idx
    const el = document.getElementById(next.id)
    el.style.opacity = '0'
    el.classList.remove('exit-down','exit-fade','exit-zoom')
    el.classList.add('active', next.enter)
    next.setup()
    document.getElementById('demo-progress').style.width = ((idx+1)/SCENES.length*100)+'%'

    // Auto-advance
    if (idx < SCENES.length - 1) {
      timer = setTimeout(() => go(idx+1), next.dur)
    }
  }, delay)
}

// ── Helpers ──
function typeWords(el, html, base=0) {
  let i = 0
  el.innerHTML = html.replace(/(\S+)/g, (m) => {
    if (m.startsWith('<') && m.endsWith('>')) return m
    return `<span class="w" style="animation-delay:${base + (i++)*70}ms">${m}</span>`
  })
}

function typeChars(el, text, accentWord, base=0) {
  let html = ''
  const words = text.split(' ')
  let charIdx = 0
  words.forEach((word, wi) => {
    const isAccent = word === accentWord
    if (isAccent) html += '<em>'
    word.split('').forEach(ch => {
      html += `<span class="ch" style="animation-delay:${base + charIdx*40}ms">${ch}</span>`
      charIdx++
    })
    if (isAccent) html += '</em>'
    if (wi < words.length-1) { html += ' '; charIdx++ }
  })
  el.innerHTML = html
}

function makeCard(x, y, rx, ry, blur, delay, opacity, content, w) {
  const d = document.createElement('div')
  d.className = 'tilt-card'
  d.style.cssText = `left:${x};top:${y};--rx:${rx}deg;--ry:${ry}deg;--fb:${blur}px;animation-delay:${delay}ms;width:${w||220}px`
  d.style.setProperty('opacity','0')
  d.innerHTML = content
  setTimeout(() => d.classList.add('in'), 10)
  return d
}

// ── Scene setups ──

function setupS0() {
  const el = document.getElementById('s0t')
  el.innerHTML = '<div style="font-family:DM Sans,sans-serif;font-style:normal;font-weight:400;font-size:clamp(14px,2vw,20px);letter-spacing:.14em;text-transform:uppercase;color:#8a8880;margin-bottom:20px;opacity:0;animation:wIn .6s .2s cubic-bezier(.16,1,.3,1) forwards">You create content</div>'
    + '<div style="opacity:0;animation:wIn .7s .8s cubic-bezier(.16,1,.3,1) forwards">But <em>who plans it?</em></div>'
}

function setupS1() {
  const c = document.getElementById('s1cards')
  c.innerHTML = ''
  const cards = [
    { x:'3%',  y:'8%',  rx:3,  ry:-8,  d:300, t:'<div style="font-size:10px;color:#8a8880;letter-spacing:.1em;text-transform:uppercase">Instagram</div><div style="font-size:13px;margin-top:6px;color:#edede9">What should I post today?</div><div style="font-size:10px;color:#454540;margin-top:8px">No ideas. Again.</div>' },
    { x:'62%', y:'5%',  rx:-2, ry:6,   d:500, t:'<div style="font-size:10px;color:#8a8880;letter-spacing:.1em;text-transform:uppercase">Analytics</div><div style="font-size:13px;margin-top:6px;color:#edede9">Views dropped 40%</div><div style="font-size:10px;color:#e87a7a;margin-top:8px">Why??</div>' },
    { x:'8%',  y:'52%', rx:4,  ry:-5,  d:700, t:'<div style="font-size:10px;color:#8a8880;letter-spacing:.1em;text-transform:uppercase">TikTok</div><div style="font-size:13px;margin-top:6px;color:#edede9">Need a trending sound</div><div style="font-size:10px;color:#454540;margin-top:8px">Spent 2 hours searching...</div>' },
    { x:'70%', y:'48%', rx:-3, ry:10,  d:900, t:'<div style="font-size:10px;color:#8a8880;letter-spacing:.1em;text-transform:uppercase">Captions</div><div style="font-size:13px;margin-top:6px;color:#edede9">Writer\'s block</div><div style="font-size:10px;color:#454540;margin-top:8px">Staring at blank screen</div>' },
    { x:'35%', y:'68%', rx:2,  ry:-4,  d:600, t:'<div style="font-size:10px;color:#8a8880;letter-spacing:.1em;text-transform:uppercase">Schedule</div><div style="font-size:13px;margin-top:6px;color:#edede9">Missed optimal time</div><div style="font-size:10px;color:#e8c87a;margin-top:8px">Posted at 11pm...</div>' },
    { x:'82%', y:'25%', rx:-5, ry:12,  d:400, t:'<div style="font-size:10px;color:#8a8880;letter-spacing:.1em;text-transform:uppercase">Trends</div><div style="font-size:13px;margin-top:6px;color:#edede9">Already missed this one</div><div style="font-size:10px;color:#454540;margin-top:8px">Found out 3 days late</div>' },
  ]
  cards.forEach(cd => c.appendChild(makeCard(cd.x, cd.y, cd.rx, cd.ry, 3, cd.d, .2, cd.t)))

  const txt = document.getElementById('s1t')
  txt.innerHTML = '<div style="font-family:DM Sans,sans-serif;font-style:normal;font-weight:400;font-size:clamp(14px,2vw,20px);letter-spacing:.14em;text-transform:uppercase;color:#8a8880;margin-bottom:20px;opacity:0;animation:wIn .6s .5s cubic-bezier(.16,1,.3,1) forwards">You\'re doing</div>'
    + '<div style="opacity:0;animation:wIn .7s 1s cubic-bezier(.16,1,.3,1) forwards"><em>everything</em> yourself.</div>'
}

function setupS2() {
  typeWords(document.getElementById('s2t'),
    'Filming. Writing. Planning.<br>Posting. <em>Analyzing.</em> Repeat.')
  const b = document.getElementById('s2b')
  b.textContent = 'You could be growing faster with the right team behind you.'
  b.style.opacity = '0'; b.style.animation = 'none'
  setTimeout(() => { b.style.animation = 'wIn .7s 1.4s cubic-bezier(.16,1,.3,1) forwards' }, 50)
}

function setupS3() {
  const el = document.getElementById('s3t')
  el.innerHTML = '<div style="font-family:DM Sans,sans-serif;font-style:normal;font-weight:400;font-size:clamp(14px,2vw,20px);letter-spacing:.14em;text-transform:uppercase;color:#8a8880;margin-bottom:24px;opacity:0;animation:wIn .6s .2s cubic-bezier(.16,1,.3,1) forwards">What if you had</div>'
    + '<div style="opacity:0;animation:wIn .8s .9s cubic-bezier(.16,1,.3,1) forwards">a <em>team?</em></div>'
}

function setupS4() {
  typeWords(document.getElementById('s4title'),
    'Meet your <em>AI content team.</em>', 0)

  const agents = [
    { n:'Maya', r:'Trend Analyst', c:'#6ab4ff', i:'M', d:'Spots trends before they peak. Delivers data-driven reports every Monday.' },
    { n:'Jordan', r:'Content Strategist', c:'#c8f060', i:'J', d:'Builds your weekly plan. Audits what\'s working. Designs your growth strategy.' },
    { n:'Alex', r:'Copywriter', c:'#e8c87a', i:'A', d:'Writes hooks that stop the scroll. Punchy, opinionated, always on-brand.' },
    { n:'Riley', r:'Creative Director', c:'#b482ff', i:'R', d:'Audits your feed. Analyzes format performance. Keeps the brand cohesive.' },
  ]

  const box = document.getElementById('s4agents')
  box.innerHTML = ''
  agents.forEach((a, idx) => {
    const el = document.createElement('div')
    el.className = 'acard'
    el.style.cssText = `background:#111;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px;width:200px;animation-delay:${700+idx*180}ms`
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:36px;height:36px;border-radius:50%;background:${a.c};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0a0a0a;position:relative">
          ${a.i}
          <div class="pulse-ring" style="inset:-8px;position:absolute;border-color:${a.c};animation-delay:${idx*400}ms"></div>
        </div>
        <div>
          <div style="font-size:15px;font-weight:500">${a.n}</div>
          <div style="font-size:10px;color:#8a8880;letter-spacing:.04em">${a.r}</div>
        </div>
      </div>
      <div style="font-size:12px;color:#8a8880;line-height:1.65">${a.d}</div>
    `
    box.appendChild(el)
  })
}

function setupS5() {
  typeWords(document.getElementById('s5t'), 'They work. <em>You approve.</em>')

  const flow = document.getElementById('s5flow')
  flow.innerHTML = ''
  const steps = [
    { init:'M', l:'Maya spots trend', c:'#6ab4ff' },
    null,
    { init:'J', l:'Jordan plans', c:'#c8f060' },
    null,
    { init:'A', l:'Alex writes', c:'#e8c87a' },
    null,
    { init:'R', l:'Riley directs', c:'#b482ff' },
    null,
    { init:'You', l:'You approve', c:'#d4a574' },
  ]
  steps.forEach((s, i) => {
    const el = document.createElement('div')
    el.className = 'acard'
    el.style.animationDelay = (900 + i * 100) + 'ms'
    if (s) {
      el.style.textAlign = 'center'
      el.innerHTML = `<div style="width:36px;height:36px;border-radius:50%;background:${s.c};display:flex;align-items:center;justify-content:center;font-size:${s.init.length>1?'10':'13'}px;font-weight:700;color:#0a0a0a;margin:0 auto 8px">${s.init}</div><div style="font-size:10px;color:${s.c};white-space:nowrap;font-weight:500">${s.l}</div>`
    } else {
      el.innerHTML = '<div style="width:24px;height:1px;background:rgba(255,255,255,.15);margin:18px -2px 0"></div>'
    }
    flow.appendChild(el)
  })
}

// ── S5b: Live workflow demo — shows a task flowing through the pipeline
function setupS5b() {
  typeWords(document.getElementById('s5btitle'), 'Watch them <em>work together.</em>')

  const demo = document.getElementById('s5bdemo')
  const steps = [
    { agent:'Maya', init:'M', color:'#6ab4ff', action:'spots a travel trend spiking +280%', time:800 },

// ── Embedded mode — when loaded inside intro overlay ──
const isEmbedded = window.location.hash === '#autoclose'

function signalDone() {
  if (isEmbedded && window.parent !== window) {
    window.parent.postMessage('vx-intro-done', '*')
  }
}

// ── Controls ──
document.getElementById('demo-skip').addEventListener('click', () => {
  if (isEmbedded) { signalDone(); return }
  go(SCENES.length-1)
})
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' '||e.key==='Enter') { e.preventDefault(); go(cur+1) }
  if (e.key==='ArrowLeft'&&cur>0) go(cur-1)
  if (e.key==='Escape') { if (isEmbedded) { signalDone() } else { go(SCENES.length-1) } }
})
document.addEventListener('click', e => {
  if (e.target.closest('.cta-btn')) {
    if (isEmbedded) { e.preventDefault(); signalDone(); return }
  }
  if (e.target.closest('#demo-skip')) return
  go(cur+1)
})

// When the last scene finishes auto-advancing, signal done if embedded
const origGo = go
go = function(idx) {
  origGo(idx)
  // On final scene, schedule the dissolve back to home page
  if (idx === SCENES.length - 1 && isEmbedded) {
    setTimeout(signalDone, 4000) // Let the CTA scene breathe for 4s, then dissolve
  }
}

setTimeout(() => go(0), 400)
</script>
