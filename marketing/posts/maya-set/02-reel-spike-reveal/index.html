<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sovexa — +340% (12s chart reveal)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1920px;
    background: #fbfaf6; overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "tnum" 1;
  }
  body { position: relative; }

  /* — eyebrow at top, persistent — */
  .eyebrow {
    position: absolute; top: 120px; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; letter-spacing: 0.30em; color: #8a8682; text-transform: uppercase;
    opacity: 0; animation: fadeIn 0.6s ease 0.2s forwards;
  }

  /* — chart container — */
  .chart-stage {
    position: absolute; top: 240px; left: 90px; right: 90px;
    height: 880px;
    opacity: 0; animation: fadeIn 0.6s ease 0.6s forwards;
  }
  .chart-stage svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .grid-line { stroke: rgba(20,16,10,.08); stroke-dasharray: 2 6; }
  .axis { font-family: 'JetBrains Mono', monospace; font-size: 22px; fill: #8a8682; letter-spacing: 0.18em; text-transform: uppercase; }
  .now-line { stroke: rgba(20,16,10,.18); stroke-width: 2; stroke-dasharray: 4 6; opacity: 0; animation: fadeIn 0.4s ease 1.4s forwards; }

  .past-line {
    fill: none; stroke: #1a1a1a; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 1200; stroke-dashoffset: 1200;
    animation: drawPast 2.5s ease 1.2s forwards;
  }
  @keyframes drawPast { to { stroke-dashoffset: 0; } }

  .future-band {
    fill: #c08a3e; opacity: 0;
    animation: bandIn 1s ease 4.0s forwards;
  }
  @keyframes bandIn { to { opacity: 0.10; } }

  .future-line {
    fill: none; stroke: #c08a3e; stroke-width: 5; stroke-dasharray: 8 6;
    stroke-linecap: round;
    opacity: 0;
    transform-origin: 0 100%;
    animation: futureRise 1.6s cubic-bezier(.34,1.1,.64,1) 4.2s forwards;
  }
  @keyframes futureRise {
    0%   { opacity: 0; transform: scaleY(0); }
    100% { opacity: 1; transform: scaleY(1); }
  }

  .peak-dot {
    fill: #fbfaf6; stroke: #c08a3e; stroke-width: 3; opacity: 0;
    animation: peakPop .4s cubic-bezier(.34,1.56,.64,1) 5.7s forwards;
  }
  @keyframes peakPop {
    0%   { opacity: 0; transform: scale(.2); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* — the stat reveal — */
  .stat {
    position: absolute; bottom: 460px; left: 0; right: 0;
    text-align: center;
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 400;
    font-size: 380px; line-height: 1; color: #c08a3e; letter-spacing: -0.04em;
    opacity: 0; transform: scale(.85);
    animation: statRise 1.2s cubic-bezier(.34,1.1,.64,1) 6.0s forwards;
  }
  @keyframes statRise {
    0%   { opacity: 0; transform: scale(.85); }
    100% { opacity: 1; transform: scale(1); }
  }

  .caption {
    position: absolute; bottom: 360px; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; letter-spacing: 0.30em; color: #8a8682; text-transform: uppercase;
    opacity: 0; animation: fadeIn 0.8s ease 7.4s forwards;
  }

  .closing {
    position: absolute; bottom: 220px; left: 0; right: 0;
    text-align: center;
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 400;
    font-size: 88px; color: #1a1a1a; letter-spacing: -.02em;
    opacity: 0; animation: fadeIn 1s ease 8.6s forwards;
  }
  .closing em { color: #c08a3e; font-style: italic; }

  .url {
    position: absolute; bottom: 120px; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; letter-spacing: 0.40em; color: #8a8682; text-transform: uppercase;
    opacity: 0; animation: fadeIn 1s ease 9.4s forwards;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  body { animation: loop 12s linear infinite; }
  @keyframes loop { 0%,100% {} }
</style>
</head>
<body>
  <div class="eyebrow">FORECAST · 14-DAY OUTLOOK</div>

  <div class="chart-stage">
    <svg viewBox="0 0 900 600" preserveAspectRatio="none">
      <line class="grid-line" x1="0" y1="100" x2="900" y2="100"/>
      <line class="grid-line" x1="0" y1="220" x2="900" y2="220"/>
      <line class="grid-line" x1="0" y1="340" x2="900" y2="340"/>
      <line class="grid-line" x1="0" y1="460" x2="900" y2="460"/>

      <!-- past line (drawn slowly) — flat with small variation -->
      <polyline class="past-line" points="0,400 60,395 120,398 180,392 240,396 300,388 360,390 420,382 480,380"/>

      <!-- now line -->
      <line class="now-line" x1="480" y1="0" x2="480" y2="540"/>
      <text class="axis" x="0" y="580">−7D</text>
      <text class="axis" x="480" y="580" text-anchor="middle">TODAY</text>
      <text class="axis" x="900" y="580" text-anchor="end">+7D</text>

      <!-- future band -->
      <path class="future-band" d="M480,380 L540,300 L600,200 L660,120 L720,68 L780,38 L840,22 L900,12 L900,-20 L840,-12 L780,8 L720,38 L660,90 L600,170 L540,270 L480,360 Z"/>

      <!-- future projection -->
      <polyline class="future-line" points="480,380 540,300 600,200 660,120 720,68 780,38 840,22 900,12"/>

      <!-- peak dot -->
      <circle class="peak-dot" cx="900" cy="12" r="14"/>
    </svg>
  </div>

  <div class="stat">+340<span style="font-size:240px;">%</span></div>
  <div class="caption">PROJECTED REACH · 7-DAY LOOK-AHEAD</div>
  <div class="closing">Maya sees it <em>first.</em></div>
  <div class="url">SOVEXA.AI</div>
</body>
</html>
