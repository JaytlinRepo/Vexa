<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs><style>
    .bg { fill: #fbfaf6; } .ink { fill: #1a1a1a; } .ink2 { fill: #5a5856; } .ink3 { fill: #8a8682; } .accent { fill: #c08a3e; }
    .hair { stroke: rgba(20,16,10,.16); stroke-width: 1; }
    .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
    .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
  </style></defs>
  <rect class="bg" width="1080" height="1920"/>

  <!-- Top live indicator -->
  <g transform="translate(540, 280)">
    <circle cx="-110" cy="0" r="6" fill="#c08a3e"/>
    <text class="mono ink3" x="-90" y="6" font-size="22" letter-spacing="6">SOVEXA · LIVE · 04:14 AM</text>
  </g>

  <!-- Main greeting, vertical hero -->
  <text class="serif ink" x="540" y="780" font-size="180" font-style="italic" font-weight="400" letter-spacing="-2" text-anchor="middle">Good</text>
  <text class="serif ink" x="540" y="970" font-size="180" font-style="italic" font-weight="400" letter-spacing="-2" text-anchor="middle">morning.</text>

  <line class="hair" x1="180" y1="1080" x2="900" y2="1080"/>

  <text class="serif accent" x="540" y="1230" font-size="220" font-style="italic" font-weight="400" letter-spacing="-3" text-anchor="middle">Maya</text>
  <text class="serif ink" x="540" y="1380" font-size="120" font-style="italic" font-weight="400" letter-spacing="-2" text-anchor="middle">is ready.</text>

  <!-- Stats panel -->
  <g transform="translate(180, 1500)">
    <line class="hair" x1="0" y1="0" x2="720" y2="0"/>
    <text class="mono ink3" x="0" y="50" font-size="20" letter-spacing="4">SOURCES WATCHED</text>
    <text class="serif ink" x="720" y="60" font-size="56" text-anchor="end" font-style="italic">7</text>

    <line class="hair" x1="0" y1="100" x2="720" y2="100"/>
    <text class="mono ink3" x="0" y="150" font-size="20" letter-spacing="4">REPORT FILED</text>
    <text class="serif ink" x="720" y="160" font-size="56" text-anchor="end" font-style="italic">04:14</text>

    <line class="hair" x1="0" y1="200" x2="720" y2="200"/>
  </g>

  <!-- Footer URL -->
  <text class="mono accent" x="540" y="1820" font-size="26" letter-spacing="6" text-anchor="middle">SOVEXA.AI</text>
</svg>
