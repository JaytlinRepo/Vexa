<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      .bg { fill: #fbfaf6; } .ink { fill: #1a1a1a; } .ink3 { fill: #8a8682; } .accent { fill: #c08a3e; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
    </style>
    <filter id="btnShadow" x="-30%" y="-30%" width="160%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24"/>
      <feOffset dy="28"/>
      <feColorMatrix values="0 0 0 0 0.753  0 0 0 0 0.541  0 0 0 0 0.243  0 0 0 0.30 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect class="bg" width="1080" height="1080"/>

  <!-- Soft amber ripples around the touch point -->
  <circle cx="540" cy="490" r="240" fill="none" stroke="#c08a3e" stroke-width="1" opacity="0.10"/>
  <circle cx="540" cy="490" r="320" fill="none" stroke="#c08a3e" stroke-width="1" opacity="0.06"/>
  <circle cx="540" cy="490" r="400" fill="none" stroke="#c08a3e" stroke-width="1" opacity="0.04"/>

  <!-- The single button — sculpture -->
  <g filter="url(#btnShadow)">
    <rect x="340" y="430" width="400" height="120" rx="60" ry="60" fill="#c08a3e"/>
    <text class="sans" x="540" y="510" font-size="42" font-weight="500" letter-spacing="2" text-anchor="middle" fill="#fbfaf6">APPROVE</text>
  </g>

  <!-- Caption -->
  <text class="serif ink" x="540" y="820" font-size="48" font-style="italic" font-weight="400" letter-spacing="-1" text-anchor="middle">
    My entire creative <tspan class="accent">input.</tspan>
  </text>

  <text class="mono ink3" x="540" y="1010" font-size="22" letter-spacing="6" text-anchor="middle">SOVEXA.AI</text>
</svg>
