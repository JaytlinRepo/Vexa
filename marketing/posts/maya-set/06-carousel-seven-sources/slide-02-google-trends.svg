  <text class="serif ink" x="80" y="540" font-size="160" font-style="italic" font-weight="400" letter-spacing="-2">Google</text>
  <text class="serif accent" x="80" y="700" font-size="200" font-style="italic" font-weight="400" letter-spacing="-3">Trends.</text>

  <line class="hair" x1="80" y1="800" x2="1000" y2="800"/>
  <text class="sans ink2" x="80" y="880" font-size="32" font-weight="400">Search terms spiking faster than the</text>
  <text class="sans ink2" x="80" y="920" font-size="32" font-weight="400">trailing 14-day mean.</text>

  <text class="mono ink3" x="1000" y="1020" font-size="20" text-anchor="end" letter-spacing="4">SOVEXA.AI · 02 / 09</text>
