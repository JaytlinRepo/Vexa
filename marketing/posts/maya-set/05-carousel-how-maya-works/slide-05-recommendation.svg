<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs><style>
    .bg { fill: #fbfaf6; } .ink { fill: #1a1a1a; } .ink2 { fill: #5a5856; } .ink3 { fill: #8a8682; } .accent { fill: #c08a3e; }
    .hair { stroke: rgba(20,16,10,.16); stroke-width: 1; }
    .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
    .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
  </style></defs>
  <rect class="bg" width="1080" height="1080"/>
  <line class="hair" x1="80" y1="100" x2="160" y2="100"/>
  <text class="mono ink3" x="180" y="105" font-size="22" letter-spacing="4">STEP 04 / 04 — RECOMMENDATION</text>

  <text class="mono ink3" x="80" y="280" font-size="22" letter-spacing="4">SHE SAYS</text>

  <text class="serif ink" x="80" y="430" font-size="80" font-style="italic" font-weight="400" letter-spacing="-1">Run a follow-up</text>
  <text class="serif ink" x="80" y="540" font-size="80" font-style="italic" font-weight="400" letter-spacing="-1">Tuesday. Lead with</text>
  <text class="serif ink" x="80" y="650" font-size="80" font-style="italic" font-weight="400" letter-spacing="-1">the <tspan class="accent">5 a.m.</tspan> angle.</text>

  <line class="hair" x1="80" y1="780" x2="1000" y2="780"/>

  <text class="sans ink2" x="80" y="860" font-size="28" font-weight="400">She matches the spike against your past</text>
  <text class="sans ink2" x="80" y="900" font-size="28" font-weight="400">posts and tells you exactly what to do.</text>

  <text class="mono ink3" x="1000" y="1020" font-size="20" text-anchor="end" letter-spacing="4">SOVEXA.AI</text>
</svg>
