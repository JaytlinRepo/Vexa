  <text class="mono ink3" x="180" y="105" font-size="22" letter-spacing="4">STEP 02 / 04 — SOURCES</text>

  <text class="serif accent" x="80" y="450" font-size="240" font-style="italic" font-weight="400" letter-spacing="-3">7 feeds.</text>
  <text class="serif ink" x="80" y="640" font-size="180" font-style="italic" font-weight="400" letter-spacing="-2">One report.</text>

  <line class="hair" x1="80" y1="740" x2="1000" y2="740"/>

  <text class="mono ink2" x="80" y="820" font-size="24" letter-spacing="4">GOOGLE TRENDS · NEWSAPI · YOUTUBE</text>
  <text class="mono ink2" x="80" y="860" font-size="24" letter-spacing="4">REDDIT · RSS · INSTAGRAM · TIKTOK</text>

  <text class="mono ink3" x="1000" y="1020" font-size="20" text-anchor="end" letter-spacing="4">SOVEXA.AI</text>
</svg>
