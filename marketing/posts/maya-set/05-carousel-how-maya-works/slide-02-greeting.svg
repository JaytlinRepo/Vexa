<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs><style>
    .bg { fill: #fbfaf6; } .ink { fill: #1a1a1a; } .ink2 { fill: #5a5856; } .ink3 { fill: #8a8682; } .accent { fill: #c08a3e; }
    .hair { stroke: rgba(20,16,10,.16); stroke-width: 1; }
    .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
    .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
  </style></defs>
  <rect class="bg" width="1080" height="1080"/>
  <line class="hair" x1="80" y1="100" x2="160" y2="100"/>
  <text class="mono ink3" x="180" y="105" font-size="22" letter-spacing="4">04:14 AM — STEP 01 / 04</text>

  <text class="serif accent" x="80" y="540" font-size="200" font-style="italic" font-weight="400" letter-spacing="-2">Good morning.</text>

  <line class="hair" x1="80" y1="660" x2="1000" y2="660"/>

  <text class="sans ink2" x="80" y="780" font-size="38" font-weight="400">By the time you sit down,</text>
  <text class="sans ink2" x="80" y="830" font-size="38" font-weight="400">she's already been working</text>
  <text class="sans ink2" x="80" y="880" font-size="38" font-weight="400">for four hours.</text>

  <text class="mono ink3" x="1000" y="1020" font-size="20" text-anchor="end" letter-spacing="4">SOVEXA.AI</text>
</svg>
