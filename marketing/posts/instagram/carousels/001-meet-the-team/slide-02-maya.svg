<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .hair { stroke: rgba(20,16,10,0.16); stroke-width: 1; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1080"/>

  <!-- Eyebrow -->
  <line class="hair" x1="80" y1="100" x2="160" y2="100"/>
  <text class="mono ink3" x="180" y="105" font-size="22" letter-spacing="4">EMPLOYEE 01 / 04</text>

  <!-- Big name -->
  <text class="serif ink" x="80" y="380" font-size="220" font-style="italic" font-weight="400" letter-spacing="-3">Maya</text>

  <!-- Role -->
  <text class="mono accent" x="80" y="450" font-size="22" letter-spacing="6">TREND &amp; INSIGHTS ANALYST</text>

  <!-- Hairline -->
  <line class="hair" x1="80" y1="510" x2="1000" y2="510"/>

  <!-- One-liner -->
  <text class="sans ink2" x="80" y="600" font-size="34" font-weight="400">She watches Google Trends, NewsAPI,</text>
  <text class="sans ink2" x="80" y="650" font-size="34" font-weight="400">YouTube, Reddit, and three RSS feeds.</text>
  <text class="sans ink2" x="80" y="700" font-size="34" font-weight="400">Files a report every Monday at 7am.</text>

  <!-- Quote block -->
  <line class="hair" x1="80" y1="800" x2="1000" y2="800"/>
  <text class="mono ink3" x="80" y="850" font-size="18" letter-spacing="4">SHE SAYS</text>
  <text class="serif accent" x="80" y="930" font-size="44" font-style="italic" font-weight="400">"I'm seeing a 340% spike on this term.</text>
  <text class="serif accent" x="80" y="985" font-size="44" font-style="italic" font-weight="400">Here's why it matters."</text>

  <!-- Footer -->
  <text class="mono ink3" x="1000" y="1050" font-size="18" text-anchor="end" letter-spacing="4">SOVEXA.AI</text>
</svg>
