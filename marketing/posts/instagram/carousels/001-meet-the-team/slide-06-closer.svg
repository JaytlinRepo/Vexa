<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .panel { fill: #f4f1ea; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .hair { stroke: rgba(20,16,10,0.16); stroke-width: 1; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1080"/>

  <!-- Eyebrow -->
  <line class="hair" x1="80" y1="100" x2="160" y2="100"/>
  <text class="mono ink3" x="180" y="105" font-size="22" letter-spacing="4">RUN YOUR CONTENT LIKE A COMPANY</text>

  <!-- Hero -->
  <text class="serif ink" x="80" y="500" font-size="180" font-style="italic" font-weight="400" letter-spacing="-2">You're the</text>
  <text class="serif accent" x="80" y="690" font-size="220" font-style="italic" font-weight="400" letter-spacing="-2">CEO.</text>

  <!-- Hairline -->
  <line class="hair" x1="80" y1="800" x2="1000" y2="800"/>

  <!-- Sub -->
  <text class="sans ink2" x="80" y="870" font-size="38" font-weight="400">They do the work. You make the calls.</text>

  <!-- CTA -->
  <text class="mono accent" x="80" y="990" font-size="26" letter-spacing="6">SOVEXA.AI</text>
  <text class="mono ink3" x="1000" y="990" font-size="22" text-anchor="end" letter-spacing="4">06 / 06</text>
</svg>
