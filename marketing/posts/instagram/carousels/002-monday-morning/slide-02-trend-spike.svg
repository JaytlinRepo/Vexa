<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .accentSoft { fill: #f3e7d2; }
      .hair { stroke: rgba(20,16,10,0.16); stroke-width: 1; }
      .hair2 { stroke: rgba(20,16,10,0.08); stroke-width: 1; stroke-dasharray: 1 4; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
      .pastLine { fill: none; stroke: #1a1a1a; stroke-width: 2; }
      .futureLine { fill: none; stroke: #c08a3e; stroke-width: 2.5; stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1080"/>

  <!-- Eyebrow -->
  <line class="hair" x1="80" y1="100" x2="160" y2="100"/>
  <text class="mono ink3" x="180" y="105" font-size="22" letter-spacing="4">7:04 AM — TREND DESK</text>

  <!-- Big stat -->
  <text class="serif accent" x="80" y="430" font-size="360" font-style="italic" font-weight="400" letter-spacing="-6">340%</text>

  <!-- Caption -->
  <text class="mono ink3" x="80" y="490" font-size="22" letter-spacing="4">SPIKE ON A SEARCH TERM IN YOUR NICHE</text>

  <!-- Hairline -->
  <line class="hair" x1="80" y1="540" x2="1000" y2="540"/>

  <!-- Mini chart -->
  <g transform="translate(80, 590)">
    <!-- Grid -->
    <line class="hair2" x1="0" y1="0" x2="920" y2="0"/>
    <line class="hair2" x1="0" y1="60" x2="920" y2="60"/>
    <line class="hair2" x1="0" y1="120" x2="920" y2="120"/>
    <line class="hair2" x1="0" y1="180" x2="920" y2="180"/>

    <!-- Past line (flat-ish) -->
    <polyline class="pastLine" points="0,160 80,150 160,155 240,148 320,152 400,145 480,150 560,140"/>

    <!-- Spike (future amber dashed) -->
    <polyline class="futureLine" points="560,140 640,100 720,55 800,28 880,15 920,10"/>

    <!-- Now line marker -->
    <line stroke="#8a8682" stroke-width="1" stroke-dasharray="2 3" x1="560" y1="0" x2="560" y2="180"/>
    <text class="mono ink3" x="565" y="14" font-size="16" letter-spacing="3">NOW</text>
  </g>

  <!-- Body -->
  <line class="hair" x1="80" y1="850" x2="1000" y2="850"/>
  <text class="sans ink2" x="80" y="920" font-size="34" font-weight="400">Maya filed the report at 4am</text>
  <text class="sans ink2" x="80" y="970" font-size="34" font-weight="400">while you slept.</text>

  <!-- Footer -->
  <text class="mono ink3" x="1000" y="1040" font-size="18" text-anchor="end" letter-spacing="4">SOVEXA.AI</text>
</svg>
