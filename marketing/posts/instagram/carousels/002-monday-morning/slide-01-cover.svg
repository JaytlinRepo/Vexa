<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .hair { stroke: rgba(20,16,10,0.16); stroke-width: 1; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1080"/>

  <line class="hair" x1="80" y1="100" x2="160" y2="100"/>
  <text class="mono ink3" x="180" y="105" font-size="22" letter-spacing="4">DISPATCH 002 — MONDAY MORNING</text>

  <text class="serif ink" x="80" y="450" font-size="140" font-style="italic" font-weight="400" letter-spacing="-2">What</text>
  <text class="serif accent" x="80" y="610" font-size="180" font-style="italic" font-weight="400" letter-spacing="-2">Monday</text>
  <text class="serif ink" x="80" y="780" font-size="120" font-style="italic" font-weight="400" letter-spacing="-2">looks like now.</text>

  <line class="hair" x1="80" y1="900" x2="1000" y2="900"/>
  <text class="mono ink3" x="1000" y="1010" font-size="20" text-anchor="end" letter-spacing="4">SOVEXA.AI</text>
</svg>
