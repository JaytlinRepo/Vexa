<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="640" viewBox="0 0 1920 640">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
    </style>
  </defs>
  <rect class="bg" width="1920" height="640"/>

  <!-- One line, monumental. The billboard treatment. -->
  <text class="serif ink" x="960" y="380" font-size="220" font-style="italic" font-weight="400" letter-spacing="-4" text-anchor="middle">
    A company. For <tspan class="accent">one</tspan>.
  </text>

  <!-- Subtle URL bottom right -->
  <text class="mono ink3" x="1880" y="600" font-size="22" letter-spacing="6" text-anchor="end">SOVEXA.AI</text>
</svg>
