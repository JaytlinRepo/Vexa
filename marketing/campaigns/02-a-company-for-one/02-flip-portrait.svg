<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .hair { stroke: rgba(20,16,10,0.16); stroke-width: 1; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1350"/>

  <!-- Top: the team list, tiny mono row -->
  <text class="mono ink2" x="540" y="200" font-size="22" letter-spacing="8" text-anchor="middle">MAYA   ·   JORDAN   ·   ALEX   ·   RILEY</text>
  <line class="hair" x1="180" y1="240" x2="900" y2="240"/>
  <text class="mono ink3" x="540" y="280" font-size="16" letter-spacing="6" text-anchor="middle">YOUR FOUR EMPLOYEES</text>

  <!-- Bottom: the headline -->
  <text class="serif ink" x="540" y="780" font-size="170" font-style="italic" font-weight="400" letter-spacing="-3" text-anchor="middle">A company.</text>
  <text class="serif ink" x="540" y="970" font-size="170" font-style="italic" font-weight="400" letter-spacing="-3" text-anchor="middle">
    For <tspan class="accent">one</tspan>.
  </text>

  <!-- Footer credit -->
  <text class="mono ink3" x="540" y="1290" font-size="22" letter-spacing="6" text-anchor="middle">SOVEXA.AI</text>
</svg>
