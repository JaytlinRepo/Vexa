<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1080"/>

  <!-- Two-line declaration. Centered. Restrained. -->
  <text class="serif ink" x="540" y="500" font-size="180" font-style="italic" font-weight="400" letter-spacing="-3" text-anchor="middle">A company.</text>
  <text class="serif ink" x="540" y="700" font-size="180" font-style="italic" font-weight="400" letter-spacing="-3" text-anchor="middle">
    For <tspan class="accent">one</tspan>.
  </text>

  <!-- Tiny credit -->
  <text class="mono ink3" x="540" y="1010" font-size="22" letter-spacing="6" text-anchor="middle">SOVEXA.AI</text>
</svg>
