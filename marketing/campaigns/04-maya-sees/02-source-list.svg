<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .hair { stroke: rgba(20,16,10,0.08); stroke-width: 1; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1350"/>

  <!-- Eyebrow -->
  <text class="mono ink3" x="540" y="180" font-size="22" letter-spacing="6" text-anchor="middle">SHE WATCHES — WHILE YOU SLEEP</text>

  <!-- Editorial list -->
  <g transform="translate(180, 320)">
    <!-- Source 01 -->
    <line class="hair" x1="0" y1="0" x2="720" y2="0"/>
    <text class="mono ink3" x="0" y="50" font-size="14" letter-spacing="3">01</text>
    <text class="serif ink" x="80" y="62" font-size="46" font-style="italic" font-weight="400">Google Trends</text>
    <circle cx="700" cy="44" r="5" fill="#c08a3e"><animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>

    <!-- 02 -->
    <line class="hair" x1="0" y1="100" x2="720" y2="100"/>
    <text class="mono ink3" x="0" y="150" font-size="14" letter-spacing="3">02</text>
    <text class="serif ink" x="80" y="162" font-size="46" font-style="italic" font-weight="400">NewsAPI</text>
    <circle cx="700" cy="144" r="5" fill="#c08a3e"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>

    <!-- 03 -->
    <line class="hair" x1="0" y1="200" x2="720" y2="200"/>
    <text class="mono ink3" x="0" y="250" font-size="14" letter-spacing="3">03</text>
    <text class="serif ink" x="80" y="262" font-size="46" font-style="italic" font-weight="400">YouTube</text>
    <circle cx="700" cy="244" r="5" fill="#c08a3e"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/></circle>

    <!-- 04 -->
    <line class="hair" x1="0" y1="300" x2="720" y2="300"/>
    <text class="mono ink3" x="0" y="350" font-size="14" letter-spacing="3">04</text>
    <text class="serif ink" x="80" y="362" font-size="46" font-style="italic" font-weight="400">Reddit</text>
    <circle cx="700" cy="344" r="5" fill="#c08a3e"><animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>

    <!-- 05 -->
    <line class="hair" x1="0" y1="400" x2="720" y2="400"/>
    <text class="mono ink3" x="0" y="450" font-size="14" letter-spacing="3">05</text>
    <text class="serif ink" x="80" y="462" font-size="46" font-style="italic" font-weight="400">RSS feeds</text>
    <circle cx="700" cy="444" r="5" fill="#c08a3e"><animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/></circle>

    <!-- 06 -->
    <line class="hair" x1="0" y1="500" x2="720" y2="500"/>
    <text class="mono ink3" x="0" y="550" font-size="14" letter-spacing="3">06</text>
    <text class="serif ink" x="80" y="562" font-size="46" font-style="italic" font-weight="400">Instagram</text>
    <circle cx="700" cy="544" r="5" fill="#c08a3e"><animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite"/></circle>

    <!-- 07 -->
    <line class="hair" x1="0" y1="600" x2="720" y2="600"/>
    <text class="mono ink3" x="0" y="650" font-size="14" letter-spacing="3">07</text>
    <text class="serif ink" x="80" y="662" font-size="46" font-style="italic" font-weight="400">TikTok</text>
    <circle cx="700" cy="644" r="5" fill="#c08a3e"><animate attributeName="opacity" values="1;0.2;1" dur="1.7s" repeatCount="indefinite"/></circle>

    <line class="hair" x1="0" y1="700" x2="720" y2="700" stroke-width="2"/>
  </g>

  <!-- Hero line -->
  <text class="serif ink" x="540" y="1170" font-size="78" font-style="italic" font-weight="400" letter-spacing="-2" text-anchor="middle">
    Seven <tspan class="accent">sources.</tspan>
  </text>
  <text class="serif ink" x="540" y="1250" font-size="78" font-style="italic" font-weight="400" letter-spacing="-2" text-anchor="middle">One report.</text>

  <!-- Footer -->
  <text class="mono ink3" x="540" y="1320" font-size="22" letter-spacing="6" text-anchor="middle">MAYA — SOVEXA.AI</text>
</svg>
