<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .card { fill: #fbfaf6; }
      .panel { fill: #f4f1ea; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .accentSoft { fill: #f3e7d2; }
      .ok { fill: #6f8f63; }
      .hair { stroke: rgba(20,16,10,0.08); stroke-width: 1; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="32"/>
      <feOffset dy="40"/>
      <feColorMatrix values="0 0 0 0 0.078  0 0 0 0 0.063  0 0 0 0 0.039  0 0 0 0.20 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect class="bg" width="1080" height="1080"/>

  <!-- Floating trend report card -->
  <g filter="url(#softShadow)">
    <rect class="card" x="100" y="180" width="880" height="600" rx="18" ry="18"/>

    <!-- Header -->
    <text class="mono ink3" x="140" y="232" font-size="16" letter-spacing="4">TREND REPORT · MON 04:14 AM</text>
    <line class="hair" x1="140" y1="252" x2="940" y2="252"/>

    <!-- Trend term + spike -->
    <text class="mono ink3" x="140" y="290" font-size="14" letter-spacing="3">SEARCH TERM</text>
    <text class="serif ink" x="140" y="346" font-size="56" font-style="italic" font-weight="400">"morning routine"</text>

    <!-- Spike -->
    <text class="serif accent" x="940" y="346" font-size="92" font-style="italic" font-weight="400" text-anchor="end" letter-spacing="-2">+340%</text>
    <text class="mono ink3" x="940" y="378" font-size="13" letter-spacing="3" text-anchor="end">48-HOUR SPIKE</text>

    <line class="hair" x1="140" y1="410" x2="940" y2="410"/>

    <!-- Correlation -->
    <text class="mono ink3" x="140" y="450" font-size="14" letter-spacing="3">CORRELATED · YOUR PAST POST</text>
    <text class="sans ink2" x="140" y="498" font-size="24" font-style="italic">"3 habits that fixed my mornings" · 14 Mar 2026</text>
    <text class="mono ok" x="140" y="528" font-size="13" letter-spacing="3">+4.2× ENGAGEMENT VS BASELINE</text>

    <line class="hair" x1="140" y1="560" x2="940" y2="560"/>

    <!-- Recommendation -->
    <text class="mono ink3" x="140" y="600" font-size="14" letter-spacing="3">SHE RECOMMENDS</text>
    <text class="serif ink" x="140" y="666" font-size="40" font-style="italic" font-weight="400">Run a follow-up on Tuesday.</text>
    <text class="serif ink" x="140" y="714" font-size="40" font-style="italic" font-weight="400">Lead with the <tspan class="accent">5 a.m.</tspan> angle.</text>

    <!-- Maya signature -->
    <text class="mono ink3" x="940" y="754" font-size="13" letter-spacing="3" text-anchor="end">FILED BY MAYA</text>
  </g>

  <!-- Caption -->
  <text class="serif ink" x="540" y="900" font-size="64" font-style="italic" font-weight="400" letter-spacing="-2" text-anchor="middle">
    <tspan class="accent">4 a.m.</tspan>
  </text>

  <!-- Footer -->
  <text class="mono ink3" x="540" y="1010" font-size="22" letter-spacing="6" text-anchor="middle">SOVEXA.AI</text>
</svg>
