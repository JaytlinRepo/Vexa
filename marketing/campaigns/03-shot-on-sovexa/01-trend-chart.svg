<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .card { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .accentStroke { stroke: #c08a3e; }
      .inkStroke { stroke: #1a1a1a; }
      .hair { stroke: rgba(20,16,10,0.08); stroke-width: 1; }
      .hair2 { stroke: rgba(20,16,10,0.08); stroke-width: 1; stroke-dasharray: 1 4; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
    </style>
    <linearGradient id="forecastFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c08a3e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c08a3e" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="32"/>
      <feOffset dy="40"/>
      <feColorMatrix values="0 0 0 0 0.078  0 0 0 0 0.063  0 0 0 0 0.039  0 0 0 0.18 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect class="bg" width="1080" height="1080"/>

  <!-- The product card, hovering -->
  <g filter="url(#softShadow)">
    <rect class="card" x="140" y="280" width="800" height="420" rx="16" ry="16"/>

    <!-- Header in card -->
    <text class="mono ink3" x="180" y="334" font-size="18" letter-spacing="4">FORECAST · 14-DAY OUTLOOK</text>
    <line class="hair" x1="180" y1="354" x2="900" y2="354"/>

    <!-- The big stat -->
    <text class="serif ink" x="180" y="450" font-size="92" font-style="italic" font-weight="400" letter-spacing="-2">+340<tspan class="accent">%</tspan></text>
    <text class="mono ink3" x="180" y="478" font-size="14" letter-spacing="3">PROJECTED REACH</text>

    <!-- Mini editorial chart -->
    <g transform="translate(180, 510)">
      <line class="hair2" x1="0" y1="0" x2="720" y2="0"/>
      <line class="hair2" x1="0" y1="50" x2="720" y2="50"/>
      <line class="hair2" x1="0" y1="100" x2="720" y2="100"/>
      <line class="hair2" x1="0" y1="150" x2="720" y2="150"/>

      <!-- Past fill -->
      <path d="M0,130 L60,125 L120,128 L180,118 L240,122 L300,115 L360,118 L420,108 L420,160 L0,160 Z" fill="url(#forecastFill)" opacity="0.4"/>

      <!-- Past line -->
      <polyline class="inkStroke" fill="none" stroke-width="2" points="0,130 60,125 120,128 180,118 240,122 300,115 360,118 420,108"/>

      <!-- Future projected -->
      <polyline class="accentStroke" fill="none" stroke-width="2.5" stroke-dasharray="6 4" points="420,108 480,80 540,52 600,32 660,18 720,8"/>

      <!-- Now marker -->
      <line stroke="#8a8682" stroke-width="1" stroke-dasharray="2 3" x1="420" y1="-4" x2="420" y2="160"/>
      <text class="mono accent" x="426" y="-8" font-size="13" letter-spacing="3">NOW</text>
    </g>
  </g>

  <!-- Caption -->
  <text class="serif ink" x="540" y="900" font-size="44" font-style="italic" font-weight="400" letter-spacing="-1" text-anchor="middle">
    Maya saw it <tspan class="accent">first.</tspan>
  </text>

  <!-- Footer -->
  <text class="mono ink3" x="540" y="1010" font-size="22" letter-spacing="6" text-anchor="middle">SOVEXA.AI</text>
</svg>
