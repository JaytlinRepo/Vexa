<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .card { fill: #fbfaf6; }
      .ink { fill: #1a1a1a; }
      .ink2 { fill: #5a5856; }
      .ink3 { fill: #8a8682; }
      .accent { fill: #c08a3e; }
      .accentSoft { fill: #f3e7d2; }
      .hair { stroke: rgba(20,16,10,0.08); stroke-width: 1; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', 'Helvetica', sans-serif; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="32"/>
      <feOffset dy="40"/>
      <feColorMatrix values="0 0 0 0 0.078  0 0 0 0 0.063  0 0 0 0 0.039  0 0 0 0.20 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect class="bg" width="1080" height="1350"/>

  <!-- The shot list card hovering -->
  <g filter="url(#softShadow)">
    <rect class="card" x="100" y="180" width="880" height="850" rx="18" ry="18"/>

    <!-- Header -->
    <text class="mono ink3" x="140" y="232" font-size="16" letter-spacing="4">SHOT LIST · WED REEL · 0:30</text>
    <text class="mono accent" x="940" y="232" font-size="13" letter-spacing="3" text-anchor="end">DRAFTED 0:14 AGO</text>
    <line class="hair" x1="140" y1="252" x2="940" y2="252"/>

    <!-- Shot 01 — the open, highlighted -->
    <rect class="accentSoft" x="120" y="276" width="840" height="116"/>
    <text class="mono accent" x="140" y="312" font-size="14" letter-spacing="3">01 · THE OPEN · 0:00 — 0:02</text>
    <text class="serif ink" x="140" y="358" font-size="34" font-style="italic" font-weight="400">Close-up. No talking.</text>
    <text class="serif ink" x="140" y="386" font-size="34" font-style="italic" font-weight="400">Let the visual do the work.</text>

    <!-- Shot 02 -->
    <text class="mono ink3" x="140" y="438" font-size="14" letter-spacing="3">02 · CONTEXT · 0:02 — 0:08</text>
    <text class="serif ink" x="140" y="478" font-size="30" font-style="italic" font-weight="400">Wide. Walking shot. Voiceover begins.</text>
    <line class="hair" x1="140" y1="510" x2="940" y2="510"/>

    <!-- Shot 03 -->
    <text class="mono ink3" x="140" y="554" font-size="14" letter-spacing="3">03 · TURN · 0:08 — 0:14</text>
    <text class="serif ink" x="140" y="594" font-size="30" font-style="italic" font-weight="400">Cut on the beat. Hard.</text>
    <line class="hair" x1="140" y1="626" x2="940" y2="626"/>

    <!-- Shot 04 -->
    <text class="mono ink3" x="140" y="670" font-size="14" letter-spacing="3">04 · BEAT · 0:14 — 0:22</text>
    <text class="serif ink" x="140" y="710" font-size="30" font-style="italic" font-weight="400">Three quick cuts on the chorus.</text>
    <line class="hair" x1="140" y1="742" x2="940" y2="742"/>

    <!-- Shot 05 -->
    <text class="mono ink3" x="140" y="786" font-size="14" letter-spacing="3">05 · CLOSE · 0:22 — 0:30</text>
    <text class="serif ink" x="140" y="826" font-size="30" font-style="italic" font-weight="400">Hold the eyes. Cut to black.</text>
    <line class="hair" x1="140" y1="858" x2="940" y2="858"/>

    <!-- Riley signature -->
    <text class="mono ink3" x="140" y="912" font-size="13" letter-spacing="3">DIRECTED BY RILEY</text>
    <text class="serif ink" x="140" y="970" font-size="26" font-style="italic">"Open on a close-up. Two seconds of silence. Then talk."</text>
  </g>

  <!-- Caption -->
  <text class="serif ink" x="540" y="1170" font-size="64" font-style="italic" font-weight="400" letter-spacing="-2" text-anchor="middle">
    Riley wrote the <tspan class="accent">open.</tspan>
  </text>

  <!-- Footer -->
  <text class="mono ink3" x="540" y="1310" font-size="22" letter-spacing="6" text-anchor="middle">SOVEXA.AI</text>
</svg>
