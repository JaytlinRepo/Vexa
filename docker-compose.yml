services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vexa
      POSTGRES_PASSWORD: vexa
      POSTGRES_DB: vexa
    ports:
      - "5432:5432"
    volumes:
      - vexa_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vexa_redis:/data

volumes:
  vexa_pg:
  vexa_redis:
